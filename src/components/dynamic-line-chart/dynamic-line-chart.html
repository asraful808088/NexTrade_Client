<div class="chart-card__chart">
  <svg viewBox="0 0 700 140" preserveAspectRatio="none" width="100%" height="140">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#00e6b4" stop-opacity="0.18" />
        <stop offset="100%" stop-color="#00e6b4" stop-opacity="0" />
      </linearGradient>

      <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#00c4f5" />
        <stop offset="100%" stop-color="#00e6b4" />
      </linearGradient>
    </defs>


    <line x1="0" y1="35" x2="700" y2="35" />
    <line x1="0" y1="70" x2="700" y2="70" />
    <line x1="0" y1="105" x2="700" y2="105" />


    <path [attr.d]="areaPath" fill="url(#areaGrad)"></path>

    <path
      [attr.d]="linePath"
      fill="none"
      stroke="url(#lineGrad)"
      stroke-width="2.2"
      stroke-linejoin="round"
    ></path>


    <circle *ngIf="data.length" [attr.cx]="lastX" [attr.cy]="lastY" r="4" fill="#00e6b4"></circle>
  </svg>
</div>
